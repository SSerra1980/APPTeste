<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<title>Relógio Portugal</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: rgb(11,26,53);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, Helvetica, sans-serif;
}

#clock {
    color: #FFFFFF;
    text-align: center;
    white-space: nowrap;
}

#date {
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

#time {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 2px;
}
</style>

</head>
<body>

<div id="clock">
    <div id="date">14 de julho de 2026</div>
    <div id="time">00:00:00</div>
</div>

<script>

function atualizarRelogio() {

    const agora = new Date();

    const data = new Intl.DateTimeFormat('pt-PT', {
        timeZone: 'Europe/Lisbon',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    }).format(agora);

    const hora = new Intl.DateTimeFormat('pt-PT', {
        timeZone: 'Europe/Lisbon',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    }).format(agora);

    document.getElementById("date").textContent = data;
    document.getElementById("time").textContent = hora;
}

atualizarRelogio();
setInterval(atualizarRelogio, 1000);

</script>

</body>
</html>
